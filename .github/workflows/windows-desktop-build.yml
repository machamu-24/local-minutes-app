name: windows-desktop-build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - "codex/**"
    paths:
      - ".github/workflows/windows-desktop-build.yml"
      - "backend/**"
      - "frontend/**"
      - "src-tauri/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm install --dir frontend --frozen-lockfile

      - name: Create backend venv
        run: python -m venv backend/.venv

      - name: Install backend dependencies
        run: |
          backend/.venv/Scripts/python.exe -m pip install --upgrade pip
          backend/.venv/Scripts/python.exe -m pip install -r backend/requirements.txt -r backend/requirements-build.txt

      - name: Build backend executable
        run: |
          backend/.venv/Scripts/python.exe scripts/build_backend.py \
            --python backend/.venv/Scripts/python.exe \
            --target-triple x86_64-pc-windows-msvc

      - name: Smoke test backend executable
        shell: pwsh
        run: |
          $backendPath = "src-tauri/binaries/local-minutes-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $backendPath)) {
            throw "missing backend executable: $backendPath"
          }

          $healthUrl = "http://127.0.0.1:8011/api/health"
          $env:LOCAL_MINUTES_API_PORT = "8011"
          $env:LOCAL_MINUTES_APP_DATA_DIR = Join-Path $env:RUNNER_TEMP "local-minutes-backend-smoke"

          $proc = Start-Process -FilePath $backendPath -PassThru

          try {
            $healthy = $false

            for ($attempt = 0; $attempt -lt 45; $attempt++) {
              Start-Sleep -Seconds 2

              if ($proc.HasExited) {
                throw "backend executable exited early with code $($proc.ExitCode)"
              }

              try {
                $health = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 5
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }

            if (-not $healthy) {
              throw "backend executable health check did not pass via $healthUrl"
            }

            # Verify CORS headers for the Tauri Windows production origin.
            # Previous builds were missing this origin which caused every API
            # request to be blocked by the browser CORS policy.
            $corsOrigins = @(
              "http://tauri.localhost",
              "https://tauri.localhost"
            )

            foreach ($origin in $corsOrigins) {
              try {
                $corsResponse = Invoke-WebRequest -Uri $healthUrl -Method OPTIONS -Headers @{
                  "Origin" = $origin
                  "Access-Control-Request-Method" = "GET"
                } -TimeoutSec 5

                $allowOrigin = $corsResponse.Headers["Access-Control-Allow-Origin"]
                if ($allowOrigin -ne $origin) {
                  throw "CORS check failed for origin '$origin': Access-Control-Allow-Origin='$allowOrigin'"
                }
              } catch {
                throw "CORS preflight failed for origin '$origin': $($_.Exception.Message)"
              }
            }

            Write-Host "CORS verification passed for Tauri production origins"
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Build llama-server
        run: |
          LLAMA_DIR="$RUNNER_TEMP/llama.cpp"
          rm -rf "$LLAMA_DIR"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git "$LLAMA_DIR"
          cmake -S "$LLAMA_DIR" -B "$LLAMA_DIR/build" \
            -DLLAMA_BUILD_SERVER=ON \
            -DGGML_NATIVE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build "$LLAMA_DIR/build" --config Release --target llama-server
          LLAMA_SERVER_PATH="$(find "$LLAMA_DIR/build" -name 'llama-server.exe' | head -n 1)"
          test -n "$LLAMA_SERVER_PATH"
          cp "$LLAMA_SERVER_PATH" src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe

      - name: Download Visual C++ Redistributable
        shell: pwsh
        run: |
          $vcRedistDir = "src-tauri/resources"
          New-Item -ItemType Directory -Path $vcRedistDir -Force | Out-Null
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $vcRedistPath = Join-Path $vcRedistDir "vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable from $vcRedistUrl"
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile $vcRedistPath
          Write-Host "Downloaded: $(Get-Item $vcRedistPath | Select-Object -ExpandProperty Length) bytes"

      - name: Build Tauri desktop app
        run: pnpm tauri build

      - name: Inspect desktop bundle
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Smoke test desktop app startup
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" |
            Select-Object -First 1

          if (-not $installer) {
            throw "missing NSIS installer under src-tauri/target/release/bundle/nsis"
          }

          $installDir = Join-Path $env:RUNNER_TEMP "local-minutes-smoke"
          if (Test-Path $installDir) {
            Remove-Item -Path $installDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installDir | Out-Null

          $installProc = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -PassThru -Wait
          if ($installProc.ExitCode -ne 0) {
            throw "silent install failed with exit code $($installProc.ExitCode)"
          }

          $exeCandidates = Get-ChildItem -Path $installDir -Recurse -Filter "*.exe"
          $exeCandidates | Select-Object FullName, Name | Format-Table -AutoSize

          $appPath = $exeCandidates |
            Where-Object {
              $_.Name -in @("Local Minutes.exe", "local-minutes-app.exe", "app.exe")
            } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $appPath) {
            Get-ChildItem -Path $installDir -Recurse | Select-Object FullName | Format-Table -AutoSize
            throw "could not locate installed desktop executable"
          }

          $healthUrl = "http://127.0.0.1:8010/api/health"
          $env:LOCAL_MINUTES_TAURI_MANAGED_RUNTIME = "1"
          $env:LOCAL_MINUTES_API_PORT = "8010"

          $proc = Start-Process -FilePath $appPath -PassThru

          try {
            $healthy = $false

            for ($attempt = 0; $attempt -lt 45; $attempt++) {
              Start-Sleep -Seconds 2

              if ($proc.HasExited) {
                throw "desktop app exited early with code $($proc.ExitCode)"
              }

              try {
                $health = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 5
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }

            if (-not $healthy) {
              Write-Host "installed app path: $appPath"
              Get-Process "local-minutes-backend" -ErrorAction SilentlyContinue
              Get-Process "llama-server" -ErrorAction SilentlyContinue
              throw "backend health check did not pass via $healthUrl"
            }
          } finally {
            Get-Process "local-minutes-backend" -ErrorAction SilentlyContinue | Stop-Process -Force
            Get-Process "llama-server" -ErrorAction SilentlyContinue | Stop-Process -Force

            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Upload desktop bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: local-minutes-windows-bundle
          path: src-tauri/target/release/bundle/**
